services:
  mariadb:
    image: mariadb:lts
    container_name: restaurante_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: restaurante_pos_db
      MARIADB_USER: restaurante_user
      MARIADB_PASSWORD: restaurante_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  adminer:
    image: adminer:latest
    container_name: restaurante_adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      - mariadb

volumes:
  mariadb_data: